name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create plugin zip
        id: package
        run: |
          PLUGIN_SLUG="alynt-isha-content-bundles"
          VERSION="${{ github.event.release.tag_name }}"
          mkdir -p "build/${PLUGIN_SLUG}"
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='build' \
                    --exclude='vendor' \
                    --exclude='tests' \
                    --exclude='docs' \
                    --exclude='coverage' \
                    --exclude='.editorconfig' \
                    --exclude='.gitattributes' \
                    --exclude='.gitignore' \
                    --exclude='.phpcs.xml' \
                    --exclude='.phpunit.result.cache' \
                    --exclude='AI_CODING_RULES.md' \
                    --exclude='phpunit.xml.dist' \
                    --exclude='composer.phar' \
                    --exclude='composer.json' \
                    --exclude='composer.lock' \
                    --exclude='session-context.tmp.md' \
                    --exclude='session-handoff.tmp.md' \
                    --exclude='README.md' \
                    --exclude='CHANGELOG.md' \
                    --exclude='*.log' \
                    --exclude='*.map' \
                    --exclude='*.tmp.md' \
                    ./ "build/${PLUGIN_SLUG}/"
          for excluded_path in docs vendor tests .git .github; do
            if [ -e "build/${PLUGIN_SLUG}/${excluded_path}" ]; then
              echo "Unexpected release path: ${excluded_path}" >&2
              exit 1
            fi
          done
          cd build
          zip -r "${PLUGIN_SLUG}-${VERSION}.zip" "${PLUGIN_SLUG}"
          echo "zip_file=build/${PLUGIN_SLUG}-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.package.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
